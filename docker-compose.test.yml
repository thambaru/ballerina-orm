version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bal-orm-test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: test_password
      MYSQL_DATABASE: test_orm_db
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_password
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptest_password"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - mysql_test_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  postgresql:
    image: postgres:15-alpine
    container_name: bal-orm-test-postgres
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_orm_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_orm_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  mysql_test_data:
  postgres_test_data:
